name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate action.yml schema
        uses: rhysd/actionlint@v1
        with:
          fail_on_error: true

      - name: Lint shell steps
        run: |
          # action.yml shell scripts are inlined; extract and shellcheck them.
          if command -v shellcheck >/dev/null 2>&1; then
            echo "shellcheck found — schema validation only for now"
          fi
